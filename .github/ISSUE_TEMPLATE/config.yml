# GitHub issue template configuration
# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository#configuring-the-template-chooser

# Disable blank issues — contributors must use a template.
blank_issues_enabled: false

contact_links:
  - name: Security vulnerability report
    url: https://github.com/evanzheng0107-dev/sword-legend-explorer/security/advisories/new
    about: Found a security issue? Please report it privately via GitHub Security Advisories (see SECURITY.md). Do NOT open a public issue.
  - name: Question or discussion
    url: https://github.com/evanzheng0107-dev/sword-legend-explorer/discussions
    about: Have a question or want to discuss the project? Start a GitHub Discussion.
