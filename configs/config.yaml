# ========================================
# 游戏窗口配置
# ========================================
window_title: "雷电模拟器"  # 雷电模拟器窗口标题
window_region: [658, 34, 564, 1004]  # 雷电模拟器游戏区域

# ========================================
# 匹配阈值配置
# ========================================
confidence_map: 0.45     # 地图匹配阈值（降低阈值提高识别率）
confidence_battle: 0.8   # 战斗按钮匹配阈值（建议0.7-0.9）
confidence_pickup: 0.8   # 拾取物品匹配阈值（建议0.7-0.9）

# ========================================
# 操作参数配置（统一保留更精准的参数值）
# ========================================
click_offset: 5          # 点击偏移量（像素，5比8更精准）
click_delay: [0.05, 0.2] # 点击延迟范围（秒，更贴近人类操作）
walk_delay: [1.0, 3.0]   # 走路延迟范围（秒）
battle_delay: [4.0, 6.0] # 战斗延迟范围（秒）
wait_delay: [2.0, 4.0]   # 等待延迟范围（秒）
loop_delay: [2.0, 4.0]   # 循环延迟范围（秒）
pathfind_offset: 60      # 寻路点击偏移量（像素）
max_failed_attempts: 3   # 最大失败尝试次数

# ========================================
# 视觉参数配置（扩大范围+增加步数提升匹配率）
# ========================================
scale_range: [0.6, 1.4]  # 缩放范围（扩大范围提高匹配率）
scale_steps: 10          # 缩放步数（增加步数提高精度）

# ========================================
# 文件路径配置
# ========================================
sample_dir: "assets/samples"          # 样本图片目录
battle_button_path: "assets/templates/battle_button.png"  # 战斗按钮模板路径
pickup_item_path: "assets/templates/pickup_item.png"     # 拾取物品模板路径（可选）

# ========================================
# 调试配置
# ========================================
debug_mode: true                        # 调试模式：true时输出详细日志
save_screenshots: false                 # 保存截图用于调试（true时保存每次截图）
screenshot_dir: "debug_screenshots"     # 调试截图保存目录
save_trigger_screenshots: true          # 触发状态时保存截图（便于大模型学习）
trigger_screenshot_dir: "trigger_screenshots" # 触发截图保存目录
show_all_matches: true                  # 显示所有模板的匹配详情（排序输出）
show_match_failure_details: true        # 显示匹配失败的原因（距离阈值多远）

# ========================================
# 决策配置
# ========================================
decision_mode: "hil"                   # 决策模式：hil（本地HIL服务器）或 cloud（云端大模型）
hil_server_url: "http://localhost:8001/hil"  # HIL 服务器地址